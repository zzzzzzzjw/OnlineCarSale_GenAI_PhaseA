<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add Car - AutoHub</title>
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/add-car.css">
</head>
<body>

    <header class="site-header">
    <div class="container">
        <div class="navbar">
            <a href="index.html" class="logo">
                <img src="../images/logo.png" alt="AutoHub" class="logo-img">
                <span>Auto<span style="color: var(--primary);">Hub</span></span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="search.html">Find Cars</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </div>
</header>

    <main>
        <div class="form-container">
            <div class="form-header">
                <h1>List Your Car</h1>
                <p>Fill in the details below to advertise your vehicle</p>
            </div>

            <form id="addCarForm" novalidate>
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Vehicle Title <span class="required">*</span></label>
                        <input type="text" id="title" placeholder="e.g., 2022 BMW X3 xDrive30i">
                        <div class="error-msg" data-for="title"></div>
                    </div>

                    <div class="input-group">
                        <label>Brand <span class="required">*</span></label>
                        <input type="text" id="brand" placeholder="e.g., BMW" list="brandSuggestions">
                        <datalist id="brandSuggestions">
                            <option>BMW</option><option>Mercedes-Benz</option><option>Audi</option>
                            <option>Tesla</option><option>Toyota</option><option>Honda</option>
                            <option>Volkswagen</option><option>BYD</option>
                        </datalist>
                        <div class="error-msg" data-for="brand"></div>
                    </div>

                    <div class="input-group">
                        <label>Model <span class="required">*</span></label>
                        <input type="text" id="model" placeholder="e.g., X3 xDrive30i">
                        <div class="error-msg" data-for="model"></div>
                    </div>

                    <div class="input-group">
                        <label>Year <span class="required">*</span></label>
                        <input type="number" id="year" placeholder="2022" min="1990" max="2026">
                        <div class="error-msg" data-for="year"></div>
                    </div>

                    <div class="input-group">
                        <label>Price (10,000 RMB) <span class="required">*</span></label>
                        <input type="number" id="price" step="0.01" placeholder="38.8">
                        <div class="error-msg" data-for="price"></div>
                    </div>

                    <div class="input-group">
                        <label>Mileage (10,000 km)</label>
                        <input type="number" id="mileage" step="0.1" placeholder="3.2">
                    </div>

                    <div class="input-group">
                        <label>Transmission</label>
                        <select id="transmission">
                            <option value="">Select</option>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                            <option value="Tiptronic">Tiptronic</option>
                            <option value="CVT">CVT</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Fuel Type</label>
                        <select id="fuelType">
                            <option value="">Select</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="Electric">Electric</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Diesel">Diesel</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Color</label>
                        <input type="text" id="color" placeholder="White / Black / Silver">
                    </div>

                    <div class="input-group">
                        <label>City</label>
                        <input type="text" id="city" placeholder="Beijing / Shanghai">
                    </div>

                    <div class="input-group">
                        <label>Contact Phone <span class="required">*</span></label>
                        <input type="tel" id="contactPhone" placeholder="13800138000">
                        <div class="error-msg" data-for="contactPhone"></div>
                    </div>

                    <div class="input-group full-width">
                        <label>Vehicle Images (Max 6)</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>Click or drag to upload images</p>
                            <small>Supports JPG, PNG, WebP. Max 5MB per image</small>
                            <input type="file" id="carImages" accept="image/jpeg,image/png,image/webp" multiple style="display: none;">
                        </div>
                        <div id="imagePreviewContainer" class="image-preview"></div>
                    </div>

                    <div class="input-group full-width">
                        <label>Description</label>
                        <textarea id="description" rows="4" placeholder="Describe your car's condition, features, maintenance history..."></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">List Car</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 AutoHub. Professional Used Car Platform</p>
        </div>
    </footer>

    <script>
        (function() {
            let selectedImages = [];
            const MAX_IMAGES = 6;

            const imageUploadArea = document.getElementById('imageUploadArea');
            const imageFileInput = document.getElementById('carImages');
            const previewContainer = document.getElementById('imagePreviewContainer');

            function renderImagePreviews() {
                previewContainer.innerHTML = '';
                if (selectedImages.length === 0) {
                    previewContainer.innerHTML = '<div style="font-size: 0.8rem; color: var(--gray); width: 100%; text-align: center;">No images yet, click above to upload</div>';
                    return;
                }
                selectedImages.forEach((src, idx) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    const img = document.createElement('img');
                    img.src = src;
                    const removeBtn = document.createElement('div');
                    removeBtn.className = 'remove-img';
                    removeBtn.innerHTML = '×';
                    removeBtn.addEventListener('click', () => {
                        selectedImages.splice(idx, 1);
                        renderImagePreviews();
                    });
                    div.appendChild(img);
                    div.appendChild(removeBtn);
                    previewContainer.appendChild(div);
                });
            }

            function handleImageUpload(files) {
                if (!files || files.length === 0) return;
                const remainingSlots = MAX_IMAGES - selectedImages.length;
                if (files.length > remainingSlots) {
                    showToast(`Maximum ${MAX_IMAGES} images. You can add ${remainingSlots} more`, 'error');
                    return;
                }
                Array.from(files).forEach(file => {
                    if (!file.type.match('image.*')) {
                        showToast(`${file.name} is not an image`, 'error');
                        return;
                    }
                    if (file.size > 5 * 1024 * 1024) {
                        showToast(`${file.name} exceeds 5MB`, 'error');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedImages.push(e.target.result);
                        renderImagePreviews();
                    };
                    reader.readAsDataURL(file);
                });
                imageFileInput.value = '';
            }

            imageUploadArea.addEventListener('click', () => imageFileInput.click());
            imageUploadArea.addEventListener('dragover', (e) => { e.preventDefault(); imageUploadArea.style.borderColor = 'var(--primary)'; });
            imageUploadArea.addEventListener('dragleave', () => { imageUploadArea.style.borderColor = 'var(--gray-light)'; });
            imageUploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                imageUploadArea.style.borderColor = 'var(--gray-light)';
                handleImageUpload(e.dataTransfer.files);
            });
            imageFileInput.addEventListener('change', (e) => handleImageUpload(e.target.files));

            function setError(fieldId, message) {
                const errorDiv = document.querySelector(`.error-msg[data-for="${fieldId}"]`);
                if (errorDiv) errorDiv.textContent = message || '';
            }
            function clearErrors() {
                document.querySelectorAll('.error-msg').forEach(el => el.textContent = '');
            }

            function validateForm() {
                let isValid = true;
                clearErrors();
                const title = document.getElementById('title').value.trim();
                const brand = document.getElementById('brand').value.trim();
                const model = document.getElementById('model').value.trim();
                const year = document.getElementById('year').value.trim();
                const price = document.getElementById('price').value.trim();
                const contactPhone = document.getElementById('contactPhone').value.trim();
                const phoneRegex = /^1[3-9]\d{9}$/;

                if (!title) { setError('title', 'Please enter vehicle title'); isValid = false; }
                if (!brand) { setError('brand', 'Please enter brand'); isValid = false; }
                if (!model) { setError('model', 'Please enter model'); isValid = false; }
                if (!year) { setError('year', 'Please enter year'); isValid = false; }
                else if (parseInt(year) < 1990 || parseInt(year) > 2026) { setError('year', 'Year must be between 1990-2026'); isValid = false; }
                if (!price) { setError('price', 'Please enter price'); isValid = false; }
                else if (parseFloat(price) <= 0) { setError('price', 'Price must be positive'); isValid = false; }
                if (!contactPhone) { setError('contactPhone', 'Please enter contact phone'); isValid = false; }
                else if (!phoneRegex.test(contactPhone)) { setError('contactPhone', 'Please enter a valid 11-digit phone number'); isValid = false; }
                return isValid;
            }

            function getCarFormData() {
                return {
                    id: 'car_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
                    title: document.getElementById('title').value.trim(),
                    brand: document.getElementById('brand').value.trim(),
                    model: document.getElementById('model').value.trim(),
                    year: parseInt(document.getElementById('year').value.trim()),
                    price: parseFloat(document.getElementById('price').value.trim()),
                    mileage: document.getElementById('mileage').value ? parseFloat(document.getElementById('mileage').value) : null,
                    transmission: document.getElementById('transmission').value,
                    fuelType: document.getElementById('fuelType').value,
                    color: document.getElementById('color').value.trim(),
                    city: document.getElementById('city').value.trim(),
                    contactPhone: document.getElementById('contactPhone').value.trim(),
                    description: document.getElementById('description').value.trim(),
                    images: selectedImages,
                    createdAt: new Date().toISOString(),
                    status: 'active',
                    views: 0
                };
            }

            function saveCarToStorage(carData) {
                let cars = JSON.parse(localStorage.getItem('autohub_cars') || '[]');
                cars.unshift(carData);
                localStorage.setItem('autohub_cars', JSON.stringify(cars));
                return true;
            }

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            const form = document.getElementById('addCarForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if (!validateForm()) {
                    showToast('Please fill out the form correctly', 'error');
                    return;
                }
                const carData = getCarFormData();
                saveCarToStorage(carData);
                showToast('Car listed successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = `car-detail.html?id=${carData.id}`;
                }, 1500);
            });

            document.getElementById('cancelBtn').addEventListener('click', () => {
                if (confirm('Cancel listing? All entered information will be lost.')) {
                    window.location.href = 'index.html';
                }
            });

            renderImagePreviews();
        })();
    </script>
</body>
</html>
