<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Registration | AutoElite</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/seller-registration.css">
</head>
<body>

  <div class="top-bar">
        <div class="container">
            <span>📞 Hotline: 400-123-4567</span>
            <div class="top-links">
                <a href="mailto:support@autoelite.com">✉ support@autoelite.com</a>
            </div>
        </div>
  </div>

    <!-- Global Navigation Bar -->
  <nav class="global-nav">
      <div class="container">
          <a href="index.html" class="logo">
              <img src="../images/logo.png" alt="AutoElite Logo">
          </a>
          <ul class="nav-menu">
              <li><a href="index.html" class="nav-link"> Home</a></li>
              <li><a href="seller-dashboard.html" class="nav-link"> Seller</a></li>
              <li><a href="search.html" class="nav-link"> Search</a></li>
              <li><a href="login.html" class="nav-link active" aria-current="page"> Login & Registration</a></li>
              <li><a href="about.html" class="nav-link"> About Us</a></li>
          </ul>
      </div>
  </nav>

  <div class="container main-layout">
    <main class="main-content register-page">
      <div class="registration-card">
        <div class="registration-header">
          <h1>Seller Registration</h1>
          <p>Join our platform to start selling your vehicles.</p>
        </div>
        
        <form id="sellerRegistrationForm" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="sellerName">Full Name</label>
              <input type="text" id="sellerName" aria-describedby="nameError" aria-invalid="false">
              <span id="nameError" class="error-text" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="sellerAddress">Business Address</label>
              <input type="text" id="sellerAddress" aria-describedby="addressError" aria-invalid="false">
              <span id="addressError" class="error-text" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="sellerPhone">Phone Number</label>
              <input type="text" id="sellerPhone" aria-describedby="phoneError" aria-invalid="false">
              <span id="phoneError" class="error-text" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="sellerEmail">Email Address</label>
              <input type="text" id="sellerEmail" aria-describedby="emailError" aria-invalid="false">
              <span id="emailError" class="error-text" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="sellerUsername">Username</label>
              <input type="text" id="sellerUsername" aria-describedby="usernameError" aria-invalid="false">
              <span id="usernameError" class="error-text" aria-live="polite"></span>
            </div>

            <div class="form-group">
              <label for="sellerPassword">Password</label>
              <input type="password" id="sellerPassword" aria-describedby="passwordError" aria-invalid="false">
              <span id="passwordError" class="error-text" aria-live="polite"></span>
            </div>
          </div>

          <div id="globalError" class="global-error" aria-live="assertive"></div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Seller Account</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="../js/seller-registration.js"></script>
</body>
</html>
