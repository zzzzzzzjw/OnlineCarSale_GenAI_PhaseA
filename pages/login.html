<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Login | AutoElite</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/seller-login.css">
</head>
<body>

  <div class="top-bar">
        <div class="container">
            <span>📞 Hotline: 400-123-4567</span>
            <div class="top-links">
                <a href="mailto:support@autoelite.com">✉ support@autoelite.com</a>
            </div>
        </div>
  </div>

    <!-- Global Navigation Bar -->
  <nav class="global-nav">
      <div class="container">
          <a href="index.html" class="logo">
              <img src="../images/logo.png" alt="AutoElite Logo">
          </a>
          <ul class="nav-menu">
              <li><a href="index.html" class="nav-link"> Home</a></li>
              <li><a href="seller-dashboard.html" class="nav-link"> Seller</a></li>
              <li><a href="search.html" class="nav-link"> Search</a></li>
              <li><a href="login.html" class="nav-link active" aria-current="page"> Login & Registration</a></li>
              <li><a href="about.html" class="nav-link"> About Us</a></li>
          </ul>
      </div>
  </nav>

  <div class="login-wrapper container">
    <main class="login-card">
      <div class="login-header">
        <h1>Seller Login</h1>
        <p>Access your dealership dashboard</p>
      </div>
      
      <form id="sellerLoginForm" novalidate>
        
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" aria-describedby="usernameError" aria-invalid="false">
          <span id="usernameError" class="error-text" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" aria-describedby="passwordError" aria-invalid="false">
          <span id="passwordError" class="error-text" aria-live="polite"></span>
        </div>

        <div class="signup-prompt">
          <p>Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
        
        <div id="globalError" class="global-error" aria-live="assertive"></div>
        
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
    </main>
  </div>
  <script src="../js/seller-login.js"></script>
</body>
</html>
