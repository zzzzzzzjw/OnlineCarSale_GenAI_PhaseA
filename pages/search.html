<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Find Cars - AutoElite</title>
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/search.css">

    <script src="../js/auth.js"></script>
</head>
<body>
    <!-- Top Info Bar -->
    <div class="top-bar">
        <div class="container">
            <span>📞 Hotline: 400-123-4567</span>
            <div class="top-links">
                <a href="mailto:support@autoelite.com">✉ support@autoelite.com</a>
            </div>
        </div>
    </div>

    <!-- Global Navigation Bar -->
    <nav class="global-nav">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="../images/logo.png" alt="AutoElite Logo">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="seller-dashboard.html" class="nav-link">Seller</a></li>
                <li><a href="search.html" class="nav-link active" aria-current="page">Search</a></li>
                <li><a href="login.html" class="nav-link">Login & Registration</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="search-hero">
            <div class="container">
                <h1>Find Your Dream Car</h1>
                <p>Search by model and year to find the perfect vehicle</p>
                <div class="search-box">
                    <div class="search-input-group">
                        <input type="text" id="modelSearch" class="search-input" placeholder="Model (e.g., BMW X3, Camry)...">
                        <input type="number" id="yearSearch" class="search-input" placeholder="Year (e.g., 2022)" min="1990" max="2026">
                    </div>
                    <button class="btn btn-primary" id="searchBtn">Search</button>
                </div>
            </div>
        </section>

        <section class="filters-section">
            <div class="container">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>Brand</label>
                        <select id="brandFilter">
                            <option value="">All Brands</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="Audi">Audi</option>
                            <option value="Tesla">Tesla</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Xiaomi">Xiaomi</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Min Price (万)</label>
                        <input type="number" id="minPrice" placeholder="0" min="0">
                    </div>
                    <div class="filter-group">
                        <label>Max Price (万)</label>
                        <input type="number" id="maxPrice" placeholder="Any" min="0">
                    </div>
                    <div class="filter-group">
                        <label>Fuel Type</label>
                        <select id="fuelFilter">
                            <option value="">Any</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Transmission</label>
                        <select id="transmissionFilter">
                            <option value="">Any</option>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="reset-btn" id="resetFilters">Reset</button>
                    </div>
                    <div class="filter-group">
                        <label>&nbsp;</label>
                        <button id="favouriteFilterBtn" class="filter-favourite-btn">❤️ Favourites</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="container">
                <div class="results-header">
                    <div class="results-count" id="resultsCount">0 cars found</div>
                    <select class="sort-select" id="sortSelect">
                        <option value="newest">Newest First</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                        <option value="mileage">Mileage: Low to High</option>
                    </select>
                </div>
                <div id="carsContainer" class="cars-grid"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <p>&copy; 2026 AutoElite Online Car Sale. All Rights Reserved. | Course Design Project</p>
        </div>
    </footer>

    <script src="../js/search.js"></script>
</body>
</html>
