<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Find Cars - AutoHub</title>
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/search.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="navbar">
            <a href="index.html" class="logo">
                <img src="../images/logo.png" alt="AutoHub" class="logo-img">
                <span>Auto<span style="color: var(--primary);">Hub</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Seller</a>
                <a href="search.html">Find Cars</a>
                <a href="favourites.html">Favourite</a>
                <a href="contact.html">Contact</a>
                <a href="about.html">About</a>
                <a href="login.html">Login / Register</a>
            </div>
        </div>
    </div>
</header>
    <main>
        <section class="search-hero">
            <div class="container">
                <h1>Find Your Dream Car</h1>
                <p>Search by model and year to find the perfect vehicle</p>
                <div class="search-box">
                    <div class="search-input-group">
                        <input type="text" id="modelSearch" class="search-input" placeholder="Model (e.g., BMW X3, Camry)...">
                        <input type="number" id="yearSearch" class="search-input" placeholder="Year (e.g., 2022)" min="1990" max="2026">
                    </div>
                    <button class="btn btn-primary" id="searchBtn">Search</button>
                </div>
            </div>
        </section>

        <section class="filters-section">
            <div class="container">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>Brand</label>
                        <select id="brandFilter">
                            <option value="">All Brands</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="Audi">Audi</option>
                            <option value="Tesla">Tesla</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Xiaomi">Xiaomi</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Min Price (万)</label>
                        <input type="number" id="minPrice" placeholder="0" min="0">
                    </div>
                    <div class="filter-group">
                        <label>Max Price (万)</label>
                        <input type="number" id="maxPrice" placeholder="Any" min="0">
                    </div>
                    <div class="filter-group">
                        <label>Fuel Type</label>
                        <select id="fuelFilter">
                            <option value="">Any</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Transmission</label>
                        <select id="transmissionFilter">
                            <option value="">Any</option>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="reset-btn" id="resetFilters">Reset</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="container">
                <div class="results-header">
                    <div class="results-count" id="resultsCount">0 cars found</div>
                    <select class="sort-select" id="sortSelect">
                        <option value="newest">Newest First</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                        <option value="mileage">Mileage: Low to High</option>
                    </select>
                </div>
                <div id="carsContainer" class="cars-grid"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 AutoHub. Professional Used Car Platform</p>
        </div>
    </footer>

    <script>
        (function() {
            // 定义6辆推荐车辆数据
            const DEFAULT_CARS = [
                { id: 'car_1', title: '2022 BMW X3 xDrive30i', brand: 'BMW', model: 'X3', year: 2022, price: 38.8, mileage: 3.2, transmission: 'Automatic', fuelType: 'Gasoline', city: 'Shanghai', image: '../images/cars/BMW-blue.jpg', createdAt: '2025-01-15' },
                { id: 'car_2', title: '2023 Tesla Model 3', brand: 'Tesla', model: 'Model 3', year: 2023, price: 22.5, mileage: 1.5, transmission: 'Automatic', fuelType: 'Electric', city: 'Beijing', image: '../images/cars/TESLA_S.jpg', createdAt: '2025-02-01' },
                { id: 'car_3', title: '2021 Mercedes-Benz C-Class', brand: 'Mercedes-Benz', model: 'C-Class', year: 2021, price: 28.9, mileage: 4.8, transmission: 'Automatic', fuelType: 'Gasoline', city: 'Shenzhen', image: '../images/cars/SUV-grey.jpg', createdAt: '2025-01-20' },
                { id: 'car_4', title: '2022 Audi Q5', brand: 'Audi', model: 'Q5', year: 2022, price: 35.6, mileage: 2.5, transmission: 'Automatic', fuelType: 'Gasoline', city: 'Guangzhou', image: '../images/cars/SUV-red.jpg', createdAt: '2025-01-10' },
                { id: 'car_5', title: '2020 Toyota Camry', brand: 'Toyota', model: 'Camry', year: 2020, price: 16.8, mileage: 5.2, transmission: 'Automatic', fuelType: 'Gasoline', city: 'Hangzhou', image: '../images/cars/BMW-white.jpg', createdAt: '2025-01-25' },
                { id: 'car_6', title: '2023 Xiaomi SU7', brand: 'Xiaomi', model: 'SU7', year: 2023, price: 21.6, mileage: 0.8, transmission: 'Automatic', fuelType: 'Electric', city: 'Shanghai', image: '../images/cars/xiaomi-grey.jpg', createdAt: '2025-02-10' }
            ];

            let allCars = [];
            let filteredCars = [];
            let currentPage = 1;
            let debounceTimer = null;
            const ITEMS_PER_PAGE = 6;  // 改为6，显示全部6辆车

            // DOM 元素
            const modelSearch = document.getElementById('modelSearch');
            const yearSearch = document.getElementById('yearSearch');
            const brandFilter = document.getElementById('brandFilter');
            const minPrice = document.getElementById('minPrice');
            const maxPrice = document.getElementById('maxPrice');
            const fuelFilter = document.getElementById('fuelFilter');
            const transmissionFilter = document.getElementById('transmissionFilter');
            const sortSelect = document.getElementById('sortSelect');
            const searchBtn = document.getElementById('searchBtn');
            const resetBtn = document.getElementById('resetFilters');

            // 加载车辆数据
            function loadCars() {
                // 读取用户通过 add-car.html 添加的车辆
                const stored = localStorage.getItem('autohub_cars');
                let userCars = [];
                
                if (stored) {
                    try {
                        userCars = JSON.parse(stored);
                    } catch(e) { console.error(e); }
                }
                
                // 合并：默认6辆车 + 用户添加的车（去重）
                const defaultIds = DEFAULT_CARS.map(c => c.id);
                const newUserCars = userCars.filter(c => !defaultIds.includes(c.id));
                
                // 格式化默认车辆（确保有 image 字段）
                const formattedDefault = DEFAULT_CARS.map(car => ({
                    ...car,
                    images: [car.image]  // 兼容原有 images 数组格式
                }));
                
                allCars = [...formattedDefault, ...newUserCars];
                
                // 保存回 localStorage（但保留用户添加的车）
                localStorage.setItem('autohub_cars', JSON.stringify(allCars));
                
                applyFilters();
            }

            // 更新 URL 参数
            function updateURL() {
                const params = new URLSearchParams();
                const model = modelSearch.value.trim();
                const year = yearSearch.value.trim();
                const brand = brandFilter.value;
                const min = minPrice.value;
                const max = maxPrice.value;
                const fuel = fuelFilter.value;
                const transmission = transmissionFilter.value;
                const sort = sortSelect.value;

                if (model) params.set('model', model);
                if (year) params.set('year', year);
                if (brand) params.set('brand', brand);
                if (min) params.set('minPrice', min);
                if (max) params.set('maxPrice', max);
                if (fuel && fuel !== '') params.set('fuel', fuel);
                if (transmission && transmission !== '') params.set('transmission', transmission);
                if (sort && sort !== 'newest') params.set('sort', sort);

                const newUrl = params.toString() ? window.location.pathname + '?' + params.toString() : window.location.pathname;
                window.history.pushState({}, '', newUrl);
            }

            // 从 URL 加载参数
            function loadParamsFromURL() {
                const params = new URLSearchParams(window.location.search);
                if (params.has('model')) modelSearch.value = params.get('model');
                if (params.has('year')) yearSearch.value = params.get('year');
                if (params.has('brand')) brandFilter.value = params.get('brand');
                if (params.has('minPrice')) minPrice.value = params.get('minPrice');
                if (params.has('maxPrice')) maxPrice.value = params.get('maxPrice');
                if (params.has('fuel')) fuelFilter.value = params.get('fuel');
                if (params.has('transmission')) transmissionFilter.value = params.get('transmission');
                if (params.has('sort')) sortSelect.value = params.get('sort');
            }

            // 筛选
            function applyFilters() {
                const modelKeyword = modelSearch.value.trim().toLowerCase();
                const yearValue = yearSearch.value.trim();
                const brand = brandFilter.value;
                const min = parseFloat(minPrice.value) || 0;
                const max = parseFloat(maxPrice.value) || Infinity;
                const fuel = fuelFilter.value;
                const transmission = transmissionFilter.value;

                filteredCars = allCars.filter(car => {
                    if (modelKeyword) {
                        const searchable = (car.title + ' ' + car.model + ' ' + car.brand).toLowerCase();
                        if (!searchable.includes(modelKeyword)) return false;
                    }
                    if (yearValue && car.year !== parseInt(yearValue)) return false;
                    if (brand && car.brand !== brand) return false;
                    if (car.price < min) return false;
                    if (car.price > max) return false;
                    if (fuel && car.fuelType !== fuel) return false;
                    if (transmission && car.transmission !== transmission) return false;
                    return true;
                });

                applySort();
                updateURL();
            }

            // 排序
            function applySort() {
                const sortBy = sortSelect.value;
                switch(sortBy) {
                    case 'newest':
                        filteredCars.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                        break;
                    case 'price_asc':
                        filteredCars.sort((a, b) => a.price - b.price);
                        break;
                    case 'price_desc':
                        filteredCars.sort((a, b) => b.price - a.price);
                        break;
                    case 'mileage':
                        filteredCars.sort((a, b) => (a.mileage || 0) - (b.mileage || 0));
                        break;
                }
                currentPage = 1;
                renderResults();
            }

            // 防抖
            const debouncedSearch = (function() {
                let timer = null;
                return function() {
                    clearTimeout(timer);
                    timer = setTimeout(() => applyFilters(), 500);
                };
            })();

            // 渲染结果
            function renderResults() {
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                const end = start + ITEMS_PER_PAGE;
                const pageCars = filteredCars.slice(start, end);
                const container = document.getElementById('carsContainer');
                const countSpan = document.getElementById('resultsCount');
                
                countSpan.textContent = `${filteredCars.length} car${filteredCars.length !== 1 ? 's' : ''} found`;
                
                if (pageCars.length === 0) {
                    container.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><h3>No cars found</h3><p>Try adjusting your search terms or filters</p><button class="btn btn-primary" id="clearFiltersBtn">Clear All Filters</button></div>`;
                    const clearBtn = document.getElementById('clearFiltersBtn');
                    if (clearBtn) clearBtn.addEventListener('click', resetAllFilters);
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }
                
                const savedCars = JSON.parse(localStorage.getItem('buyer_saved_cars') || '[]');
                const imagePath = (car) => {
                    if (car.images && car.images[0]) return car.images[0];
                    if (car.image) return car.image;
                    return '../images/cars/SUV-grey.jpg';
                };
                
                container.innerHTML = pageCars.map(car => `
                    <div class="car-card">
                        <img src="${imagePath(car)}" class="car-image" onerror="this.src='../images/cars/SUV-grey.jpg'">
                        <div class="car-info">
                            <h3 class="car-title">${car.title}</h3>
                            <div class="car-price">¥${car.price}万</div>
                            <div class="car-details">
                                <span>📅 ${car.year}</span>
                                <span>📷 ${car.mileage || 0}万 km</span>
                                <span>⚙️ ${car.transmission || 'Auto'}</span>
                                <span>⛽ ${car.fuelType || 'Gasoline'}</span>
                            </div>
                            <div class="card-footer">
                                <span class="car-city">📍 ${car.city || 'China'}</span>
                                <button class="save-btn ${savedCars.includes(car.id) ? 'saved' : ''}" data-id="${car.id}">
                                    ${savedCars.includes(car.id) ? '❤️' : '🤍'}
                                </button>
                            </div>
                            <a href="car-detail.html?id=${car.id}" class="btn btn-primary btn-sm" style="width: 100%; margin-top: 0.75rem;">View Details</a>
                        </div>
                    </div>
                `).join('');
                
                // 收藏按钮事件
                document.querySelectorAll('.save-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const carId = btn.dataset.id;
                        let saved = JSON.parse(localStorage.getItem('buyer_saved_cars') || '[]');
                        if (saved.includes(carId)) {
                            saved = saved.filter(id => id !== carId);
                            btn.textContent = '🤍';
                            btn.classList.remove('saved');
                            showToast('Removed from saved');
                        } else {
                            saved.push(carId);
                            btn.textContent = '❤️';
                            btn.classList.add('saved');
                            showToast('Saved to your list');
                        }
                        localStorage.setItem('buyer_saved_cars', JSON.stringify(saved));
                    });
                });
                
                renderPagination();
            }

            // 分页
            function renderPagination() {
                const totalPages = Math.ceil(filteredCars.length / ITEMS_PER_PAGE);
                const paginationDiv = document.getElementById('pagination');
                if (totalPages <= 1) {
                    paginationDiv.innerHTML = '';
                    return;
                }
                let html = '';
                for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }
                paginationDiv.innerHTML = html;
                document.querySelectorAll('.page-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentPage = parseInt(btn.dataset.page);
                        renderResults();
                        window.scrollTo({ top: 400, behavior: 'smooth' });
                    });
                });
            }

            // 重置筛选
            function resetAllFilters() {
                modelSearch.value = '';
                yearSearch.value = '';
                brandFilter.value = '';
                minPrice.value = '';
                maxPrice.value = '';
                fuelFilter.value = '';
                transmissionFilter.value = '';
                sortSelect.value = 'newest';
                applyFilters();
            }

            // 提示
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }

            // 事件监听
            modelSearch.addEventListener('input', debouncedSearch);
            yearSearch.addEventListener('input', debouncedSearch);
            brandFilter.addEventListener('change', applyFilters);
            minPrice.addEventListener('input', applyFilters);
            maxPrice.addEventListener('input', applyFilters);
            fuelFilter.addEventListener('change', applyFilters);
            transmissionFilter.addEventListener('change', applyFilters);
            sortSelect.addEventListener('change', applyFilters);
            searchBtn.addEventListener('click', applyFilters);
            resetBtn.addEventListener('click', resetAllFilters);
            window.addEventListener('popstate', () => {
                loadParamsFromURL();
                applyFilters();
            });

            // 初始化
            loadParamsFromURL();
            loadCars();
        })();
    </script>
</body>
</html>
