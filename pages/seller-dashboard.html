<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard | Online Car Sales</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/seller-dashboard.css">
</head>
<body>
  <header class="site-header">
    <div class="top-bar">
      <div class="container">
        <span>Seller Dashboard Center</span>
        <div class="top-links">
          <a href="#">Support</a>
          <a href="#">Logout</a>
        </div>
      </div>
    </div>
    <nav class="navbar container">
      <div class="logo">
        <span style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">CAR<span style="color: var(--secondary);">SALES</span></span>
      </div>
      <div class="nav-actions">
        <div class="nav-item">
          <span>👤</span>
          <span>My Profile</span>
        </div>
      </div>
    </nav>
  </header>

  <div class="container main-layout">
    <aside class="category-menu">
      <div class="menu-header">Seller Menu</div>
      <ul class="menu-list">
        <li><a href="#" aria-current="page"><span>Vehicle Management</span><span>›</span></a></li>
        <li><a href="#"><span>Messages</span><span>›</span></a></li>
        <li><a href="#"><span>Account Settings</span><span>›</span></a></li>
      </ul>
    </aside>

    <main class="main-content">
      
      <div class="dashboard-header">
        <div class="section-header" style="margin-bottom: 0;">
          <h2><div class="section-bar"></div> Vehicle Management</h2>
        </div>
        <a href="add-car.html" class="btn btn-primary add-vehicle-btn" aria-label="Add new vehicle">
          + Add Vehicle
        </a>
      </div>

      <form id="searchForm" class="dashboard-toolbar" novalidate>
        <div class="search-wrapper">
          <label for="vehicleSearch" class="sr-only">Search Vehicles</label>
          <input type="text" id="vehicleSearch" placeholder="Search brand or model..." aria-describedby="searchError">
          <button type="submit" class="btn btn-secondary btn-sm">Search</button>
        </div>
        <span id="searchError" class="error-text" aria-live="polite"></span>
      </form>

      <div id="vehicleGrid" class="vehicle-grid" aria-live="polite" aria-label="List of your vehicles">
        </div>

    </main>
  </div>

  <script src="../js/seller-dashboard.js"></script>
</body>
</html>
